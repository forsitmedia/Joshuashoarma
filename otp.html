<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação | Joshua's Shoarma</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="otp-screen">

    <div class="otp-ball otp-ball-top-right"></div>
    <div class="otp-ball otp-ball-left"></div>
    <div class="otp-ball otp-ball-bottom"></div>

    <div class="otp-top-space"></div>

    <section class="otp-header">
      <div class="otp-logo-circle">🥙</div>
      <h1>Verificação</h1>
      <p>Introduza o código enviado para o seu número</p>
    </section>

    <section class="otp-phone-info">
      <span id="otpPhoneDisplay">+351</span>
    </section>

    <section class="otp-code-boxes">
      <input type="text" maxlength="1" class="otp-digit" />
      <input type="text" maxlength="1" class="otp-digit" />
      <input type="text" maxlength="1" class="otp-digit" />
      <input type="text" maxlength="1" class="otp-digit" />
      <input type="text" maxlength="1" class="otp-digit" />
      <input type="text" maxlength="1" class="otp-digit" />
    </section>

    <p class="otp-helper">
      Código de teste: <strong>123456</strong>
    </p>

    <button class="otp-confirm-button" id="otpConfirmButton" type="button">
      Confirmar código
    </button>

    <button class="otp-resend-button" type="button">
      Reenviar código
    </button>

    <div class="otp-feedback" id="otpFeedback"></div>

  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const phone = params.get("phone") || "+351";
    document.getElementById("otpPhoneDisplay").textContent = phone;

    const otpInputs = document.querySelectorAll(".otp-digit");
    const otpConfirmButton = document.getElementById("otpConfirmButton");
    const otpFeedback = document.getElementById("otpFeedback");

    otpInputs.forEach((input, index) => {
      input.addEventListener("input", (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, "");

        if (e.target.value && index < otpInputs.length - 1) {
          otpInputs[index + 1].focus();
        }

        updateOtpButton();
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
          otpInputs[index - 1].focus();
        }
      });
    });

    function updateOtpButton() {
      const fullCode = Array.from(otpInputs).map(input => input.value).join("");
      if (fullCode.length === 6) {
        otpConfirmButton.classList.add("active");
      } else {
        otpConfirmButton.classList.remove("active");
      }
    }

    otpConfirmButton.addEventListener("click", () => {
      const fullCode = Array.from(otpInputs).map(input => input.value).join("");

      if (fullCode.length < 6) return;

      if (fullCode === "123456") {
        otpFeedback.textContent = "Código correto. A entrar...";
        otpFeedback.classList.add("show", "success");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
      } else {
        otpFeedback.textContent = "Código inválido. Tente novamente.";
        otpFeedback.classList.add("show", "error");
      }
    });
  </script>

</body>
</html>
